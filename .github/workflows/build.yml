name: Build and Release Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --name chunhui-cil ch_cli.py

    - name: Prepare Portable Package with Built-in Python Runtime
      shell: pwsh
      run: |
        # 创建便携包发布目录
        New-Item -ItemType Directory -Force -Path dist/chunhui-cil-portable
        # 下载官方 Windows 64位嵌入式 Python 3.10 运行时发行版
        Invoke-WebRequest -Uri "https://www.python.org/ftp/python/3.10.11/python-3.10.11-embed-amd64.zip" -OutFile "python-embed.zip"
        # 解压 Python 解释器至便携目录
        Expand-Archive -Path "python-embed.zip" -DestinationPath "dist/chunhui-cil-portable"
        # 拷贝客户端逻辑文件
        Copy-Item -Path "ch_cli.py" -Destination "dist/chunhui-cil-portable/ch_cli.py"
        # 写入快捷入口批处理程序，使用相对路径调用内置解释器，并支持参数透传
        Set-Content -Path "dist/chunhui-cil-portable/chunhui-cil.bat" -Value "@echo off`r`n`"%~dp0python.exe`" `"%~dp0ch_cli.py`" %*"
        # 清理临时文件
        Remove-Item -Path "python-embed.zip"

    - name: Compress Portable Package for Release
      shell: pwsh
      run: |
        # 将便携包目录压缩为 zip 方便作为 Release Assets 上传
        Compress-Archive -Path dist/chunhui-cil-portable/* -DestinationPath dist/chunhui-cil-portable.zip

    - name: Upload Single Executable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: chunhui-cil-windows
        path: dist/chunhui-cil.exe

    - name: Upload Built-in Runtime Portable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: chunhui-cil-portable
        path: dist/chunhui-cil-portable.zip

  build-macos:
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --name chunhui-cil ch_cli.py

    - name: Compress macOS Executable
      run: |
        cd dist
        zip chunhui-cil-mac.zip chunhui-cil

    - name: Upload macOS Artifact
      uses: actions/upload-artifact@v4
      with:
        name: chunhui-cil-macos
        path: dist/chunhui-cil-mac.zip

  publish-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
    - name: Download Windows Executable
      uses: actions/download-artifact@v4
      with:
        name: chunhui-cil-windows
        path: dist

    - name: Download Windows Portable
      uses: actions/download-artifact@v4
      with:
        name: chunhui-cil-portable
        path: dist

    - name: Download macOS Artifact
      uses: actions/download-artifact@v4
      with:
        name: chunhui-cil-macos
        path: dist

    - name: Create or Update GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: latest
        name: Latest Release (Auto Build)
        body: |
          # 最新构建发布说明 (Latest Release)
          
          春晖中学校园网命令行工具最新的跨平台可执行程序发行版。
          
          ### 📦 包含资源：
          - **`chunhui-cil.exe`**: 轻量化单文件可执行文件（双击即可启动命令行，不需要任何 Python 环境）。
          - **`chunhui-cil-portable.zip`**: 内置了官方 Python 运行时的绿色免安装便携版。
          - **`chunhui-cil-mac.zip`**: macOS 平台可执行二进制包（解压缩后在终端运行）。
          
          ---
          
          ## 📅 版本更新与演进
          
          ### 🔄 重构对比：当前版本 vs 初代版本
          
          为了解决初代版本中界面粗糙、数据解析混乱、网络稳定性差等局限，我们对项目进行了彻底的架构重构。以下是当前最新版本与最早原始版本的核心对比：
          
          | 维度 | 初代版本 (原始纯文本) | 当前版本 (重构优化版) |
          | :--- | :--- | :--- |
          | **表格与排版** | 输出为未经处理 of 原始纯文本，中英文混排时表格线严重错位、歪歪扭扭。 | 引入基于 `unicodedata.east_asian_width` 的 `get_visual_width` 自适应视觉宽度算法，配合等宽字体，输出像素级对齐的完美 Markdown 表格。 |
          | **会话与登录** | 每次运行命令均需重复输入账号密码登录，无本地持久化。 | 支持会话 Cookie 本地加密与持久化存储，登录一次即可自动复用，并具备在线状态自动心跳校验。 |
          | **命令交互** | 参数解析极其简易，无分组，无命令帮助提示，容易输入错误。 | 重构了参数解析逻辑，新增详尽的命令指南与帮助信息，支持通过教师或班级姓名进行模糊搜索。 |
          | **终端导航** | 仅支持简单的命令行输入，没有任何交互式界面。 | 引入无缓冲 `os.read` 箭头键捕获机制，支持跨平台 TUI 菜单导航，终端操作更加直观流畅。 |
          | **附件与媒体** | 仅能查看文本内容，通知公告中附带的课件、压缩包等附件无法下载。 | 自动解析 HTML 正文中的附件链接，支持一键将消息/资讯中的所有附件下载至自定义本地目录。 |
          | **文件寄取** | 无分片上传逻辑，大文件上传极易超时失败。 | 采用纯 Python 标准库手写 `multipart/form-data` 数据编码，支持 100MB 逻辑分片上传与智能合并，生成 6 位安全提取码，支持高速断点续传。 |
          | **网络健壮性** | 遇到校园网偶发的 502/504 错误时会直接崩溃闪退。 | 底层 `make_request` 嵌入 10 秒超时防护，并支持最多 3 次延迟自动重试机制。 |
          | **运行与分发** | 必须在本地安装 Python 3 环境及相关依赖，对普通用户门槛较高。 | 提供无需安装 Python 的单文件版可执行程序，以及内置独立 Python 运行时的 `chunhui-cil-portable.zip` 绿色便携包，解压即用。 |
          
          ---
          
          ### [v1.2.0] - 最新重构版更新项
          #### 🎨 核心解析器与分片优化
          - **分片大小规范化**：将文件分片上传的大小统一调整并锁定为 **100MB**，优化了分片合并请求的可靠性，避免大文件上传失败。
          - **表格对齐算法**：在底层 `HTMLToMarkdown` 解析器中引入了基于中英文真实视觉宽度计算的等宽空格填充，彻底解决终端中表格错位问题。
          - **协议补充**：补充了 MIT 开源授权协议文件 `LICENSE`，并在 README.md 中添加了跨平台运行徽标（Badges）和免 Python 依赖的可执行文件获取引导。
        draft: false
        prerelease: false
        files: |
          dist/chunhui-cil.exe
          dist/chunhui-cil-portable.zip
          dist/chunhui-cil-mac.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
